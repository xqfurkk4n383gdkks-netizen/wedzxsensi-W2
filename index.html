<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi W2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

/* NEON BACKGROUND */
canvas{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
z-index:-1;
filter:blur(0.5px);
}

.container{
width:92%;
max-width:420px;
padding:20px;
border-radius:20px;
background:rgba(10,10,10,.75);
border:1px solid rgba(255,0,60,.35);
box-shadow:
0 0 20px rgba(255,0,60,.6),
0 0 40px rgba(0,120,255,.25);
backdrop-filter:blur(10px);
}

.logo{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:15px;
background:linear-gradient(90deg,#ff0033,#0066ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 20px rgba(255,0,0,.5);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{filter:drop-shadow(0 0 5px red);}
50%{filter:drop-shadow(0 0 15px blue);}
100%{filter:drop-shadow(0 0 5px red);}
}

.btn{
width:100%;
padding:13px;
margin:6px 0;
border:none;
border-radius:14px;
background:rgba(255,255,255,.05);
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,0,60,.2);
}

.btn:hover{
transform:scale(1.03);
box-shadow:
0 0 15px #ff0033,
0 0 25px #0066ff;
}

.hidden{display:none;}

.item{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:rgba(255,255,255,.04);
border-radius:12px;
border:1px solid rgba(255,0,60,.15);
backdrop-filter:blur(5px);
}

.val{
color:#ff4d6d;
font-weight:bold;
text-shadow:0 0 10px #ff0033;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="logo">wedzXsensi W2</div>

<div id="step1">
<button class="btn" onclick="setDevice('iPhone')">iPhone</button>
<button class="btn" onclick="setDevice('Android')">Android</button>
</div>

<div id="step2" class="hidden">
<button class="btn" onclick="setStyle('Rush')">Rush</button>
<button class="btn" onclick="setStyle('Rage')">Rage</button>
<button class="btn" onclick="setStyle('Long Range')">Long Range</button>
</div>

<div id="step3" class="hidden">
<button class="btn" onclick="setFinger(2)">2 Parmak</button>
<button class="btn" onclick="setFinger(3)">3 Parmak</button>
<button class="btn" onclick="setFinger(4)">4 Parmak</button>
</div>

<div id="step4" class="hidden">
<button class="btn" onclick="generate()">HASSASİYET OLUŞTUR</button>
</div>

<div id="result" class="hidden">

<div class="item"><span>Genel</span><span id="gen" class="val"></span></div>
<div class="item"><span>Kırmızı</span><span id="red" class="val"></span></div>
<div class="item"><span>2x</span><span id="x2" class="val"></span></div>
<div class="item"><span>4x</span><span id="x4" class="val"></span></div>
<div class="item"><span>Sniper</span><span id="sniper" class="val"></span></div>
<div class="item"><span>Serbest Bakış</span><span id="free" class="val"></span></div>
<div class="item"><span>DPI</span><span id="dpi" class="val"></span></div>

<button class="btn" onclick="copy()">Kopyala</button>
<button class="btn" onclick="generate()">Yeniden Oluştur</button>

</div>

</div>

<script>

let device="",style="",finger=2;

function next(a,b){
document.getElementById(a).classList.add("hidden");
document.getElementById(b).classList.remove("hidden");
}

function setDevice(v){
device=v;
next("step1","step2");
}

function setStyle(v){
style=v;
next("step2","step3");
}

function setFinger(v){
finger=v;
next("step3","step4");
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generate(){

document.getElementById("result").classList.remove("hidden");

if(device==="iPhone"){
gen.innerText=rand(80,100);
red.innerText=rand(80,100);
x2.innerText=rand(75,95);
x4.innerText=rand(70,90);
sniper.innerText=rand(65,85);
free.innerText=rand(80,100);
dpi.innerText=rand(70,120);
}else{
gen.innerText=rand(170,200);
red.innerText=rand(165,200);
x2.innerText=rand(160,195);
x4.innerText=rand(150,190);
sniper.innerText=rand(140,185);
free.innerText=rand(170,200);
dpi.innerText=rand(500,800);
}

}

function copy(){

let text=
"wedzXsensi W2\n"+
"Genel: "+gen.innerText+"\n"+
"Kırmızı: "+red.innerText+"\n"+
"2x: "+x2.innerText+"\n"+
"4x: "+x4.innerText+"\n"+
"Sniper: "+sniper.innerText+"\n"+
"Serbest Bakış: "+free.innerText+"\n"+
"DPI: "+dpi.innerText;

navigator.clipboard.writeText(text);
alert("Kopyalandı!");
}

/* NEON PARTICLES */
const c=document.getElementById("bg");
const x=c.getContext("2d");

function resize(){
c.width=innerWidth;
c.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

let dots=[];
for(let i=0;i<300;i++){
dots.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
vx:(Math.random()-.5)*1.4,
vy:(Math.random()-.5)*1.4,
r:Math.random()*2,
c:Math.random()>0.3?"#ff0033":"#0066ff"
});
}

function anim(){
x.fillStyle="#000";
x.fillRect(0,0,c.width,c.height);

for(let d of dots){
d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>c.width)d.vx*=-1;
if(d.y<0||d.y>c.height)d.vy*=-1;

x.beginPath();
x.arc(d.x,d.y,d.r,0,Math.PI*2);
x.fillStyle=d.c;
x.shadowBlur=15;
x.shadowColor=d.c;
x.fill();
}

requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
