<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wedzXsensi W2 PRO</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        
        .card { 
            background: rgba(15, 15, 15, 0.9); 
            padding: 30px; 
            border: 2px solid #ff0000; 
            box-shadow: 0 0 25px #ff0000; 
            border-radius: 20px; 
            width: 320px; 
            text-align: center;
        }
        
        h1 { color: #ff5555; text-shadow: 0 0 15px #ff0000; margin-bottom: 25px; font-size: 1.8rem; }
        
        .btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            background: #1a0000; border: 1px solid #ff0000; color: #fff; 
            border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn:hover { background: #ff0000; color: #000; }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="card">
        <h1>wedzXsensi W2 PRO</h1>
        <div id="menu">
            <button class="btn" onclick="next('model')">iPhone</button>
            <button class="btn" onclick="next('model')">Android</button>
            <button class="btn" onclick="next('model')">PC</button>
        </div>
    </div>

    <script>
        // Neon Parçacık Animasyonu
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = Array.from({length: 80}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2, color: Math.random() > 0.5 ? '#ff0000' : '#00aaff'}));
        
        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            p.forEach(s => {
                ctx.fillStyle = s.color;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y -= 0.5; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Basit Navigasyon Mantığı
        function next(step) {
            const menu = document.getElementById('menu');
            if(step === 'model') {
                menu.innerHTML = `<input type="text" id="m" style="width:90%; padding:10px; background:#111; color:#fff; border:1px solid #ff0000;" placeholder="Telefon modeli yaz"><button class="btn" onclick="alert('Hassasiyet oluşturuluyor...')">Devam</button>`;
            }
        }
    </script>
</body>
</html>
