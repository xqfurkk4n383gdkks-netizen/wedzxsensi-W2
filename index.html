<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>wedzx V2 - Hassasiyet</title>
    <style>
        /* Tasarım ve Neon Animasyonları */
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; z-index: -1; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: rgba(0,0,0,0.6); }
        h1 { color: #ff0000; text-shadow: 0 0 10px #ff0000; font-size: 3rem; margin-bottom: 20px; }
        select, input, button { width: 300px; padding: 12px; margin: 10px; border: 1px solid #ff0000; background: #1a0000; color: #fff; border-radius: 5px; outline: none; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #ff0000; color: #000; }
        #output { margin-top: 20px; padding: 20px; border: 1px dashed #ff0000; text-align: center; display: none; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    
    <div class="container">
        <h1>wedzx V2</h1>
        <select id="brand">
            <option value="iphone">iPhone (XS - 17 Pro Max)</option>
            <option value="android">Android (Samsung, Xiaomi, POCO, vb.)</option>
        </select>
        <input type="text" id="model" placeholder="Model Girin (Örn: 15 Pro Max veya S24)">
        <button onclick="calculate()">Hassasiyeti Göster</button>
        <div id="output"></div>
    </div>

    <script>
        // Arka plan neon ağ animasyonu
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = Array.from({length: 50}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: Math.random()-0.5, vy: Math.random()-0.5}));
        
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.strokeStyle = '#ff0000';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.stroke();
            });
            requestAnimationFrame(draw);
        }
        draw();

        // Hassasiyet Hesaplama Mantığı
        function calculate() {
            const brand = document.getElementById('brand').value;
            const output = document.getElementById('output');
            let res = "";

            if(brand === 'iphone') {
                res = "GENEL: 95 | KIRMIZI NOKTA: 88 | 2X: 82 | 4X: 75 | SNIPER: 50";
            } else {
                res = "GENEL: 185 | KIRMIZI NOKTA: 195 | 2X: 170 | 4X: 165 | SNIPER: 140";
            }
            
            output.style.display = 'block';
            output.innerHTML = `<h3>${document.getElementById('model').value.toUpperCase()} İçin Ayarlar:</h3><p>${res}</p>`;
        }
    </script>
</body>
</html>
