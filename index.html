<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wedzxsensi | AI Hassasiyet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        
        :root { --neon-red: #ff1f1f; --bg-dark: #0a0a0a; }
        
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
            background-image: radial-gradient(circle, #1a0505 0%, #0a0a0a 80%);
        }

        .logo { font-size: 3rem; font-weight: 700; margin-bottom: 5px; }
        .logo span { color: var(--neon-red); }
        .subtitle { color: #555; letter-spacing: 3px; font-size: 0.9rem; margin-bottom: 40px; }

        .box {
            width: 350px; padding: 30px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid #333; border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        label { color: #888; font-size: 0.8rem; display: block; margin-bottom: 10px; }
        
        input {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: #111; border: 1px solid #333; color: white;
            border-radius: 8px; margin-bottom: 25px; outline: none;
        }

        .fps-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .fps-btn {
            background: #111; border: 1px solid #333; color: #777;
            padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .fps-btn.active { background: var(--neon-red); border-color: var(--neon-red); color: white; }

        button {
            width: 100%; padding: 18px; background: var(--neon-red);
            border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer; font-size: 1.1rem;
        }

        footer { margin-top: 30px; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="logo">wedz<span>x</span>sensi</div>
    <div class="subtitle">FREE FIRE • AI HASSASİYET MOTORU</div>

    <div class="box">
        <label>CİHAZ MODELİ</label>
        <input type="text" id="model" placeholder="Örn. iPhone 13, Redmi Note 13">
        
        <label>FPS</label>
        <div class="fps-grid">
            <div class="fps-btn" onclick="selectFps(this)">60 FPS</div>
            <div class="fps-btn" onclick="selectFps(this)">90 FPS</div>
            <div class="fps-btn" onclick="selectFps(this)">120 FPS</div>
        </div>

        <button onclick="generate()">AI HASSASİYET OLUŞTUR</button>
    </div>

    <footer>© WEDZXSENSI • FREE FIRE İÇİN OPTİMİZE EDİLMİŞTİR</footer>

    <script>
        function selectFps(el) {
            document.querySelectorAll('.fps-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function generate() {
            const model = document.getElementById('model').value;
            if(!model) { alert("Lütfen cihaz modeli girin!"); return; }
            alert("AI " + model + " için veriler analiz ediliyor...");
        }
    </script>
</body>
</html>
